main:
  params: [args]
  steps:
    # Step 1: Run BigQuery test query
    - read_vendor_attributes_sql:
        call: http.get
        args:
          url: ${"https://storage.googleapis.com/" + args.bucket + "/sql/pipeline/vendor_attributes.sql"}
          auth:
            type: OAuth2
        result: vendor_attributes_sql

    - decode_vendor_attributes_sql:
        assign:
          - vendor_attributes_sql_string: ${text.decode(vendor_attributes_sql.body)}

    - run_vendor_attributes:
        call: http.post
        args:
          url: ${"https://bigquery.googleapis.com/bigquery/v2/projects/" + args.project_id + "/jobs"}
          auth:
            type: OAuth2
          body:
            jobReference:
              projectId: ${args.project_id}
              location: ${args.location}
            configuration:
              query:
                query: ${vendor_attributes_sql_string}
                useLegacySql: false
                location: ${args.location}
        result: bq_job_response

    # Step 2: Wait for BigQuery job to complete
    - wait_for_bq:
        call: http.get
        args:
          url: ${"https://bigquery.googleapis.com/bigquery/v2/projects/" + args.project_id + "/jobs/" + bq_job_response.body.jobReference.jobId + "?location=" + args.location}
          auth:
            type: OAuth2
        result: bq_job_status

    # Step 3: Call Cloud Run brief generation service
    - call_brief_service:
        call: http.post
        args:
          url: https://fraud-case-brief-747682583836.australia-southeast1.run.app/generate
          auth:
            type: OIDC
          body:
            vendor_id: "test-vendor-001"
        result: brief_response

    # Step 4: Return results
    - return_results:
        return:
          bq_status: ${bq_job_status.body.status.state}
          brief_status: ${brief_response.body.status}
