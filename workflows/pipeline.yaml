main:
  steps:
    # Step 1: Submit BigQuery job.
    # Placeholder: SELECT 1 confirms the SA has BQ job submission rights.
    # Replace with the full SQL pipeline steps once SA has dataViewer on source datasets.
    - run_bq_placeholder:
        call: googleapis.bigquery.v2.jobs.insert
        args:
          projectId: "agentic-platforms-sandbox"
          body:
            jobReference:
              projectId: "agentic-platforms-sandbox"
              location: "australia-southeast1"
            configuration:
              query:
                query: "SELECT 1"
                useLegacySql: false
                location: "australia-southeast1"
        result: bq_job_response

    # Step 2: Wait for the BQ job using the native connector.
    # getQueryResults blocks up to timeoutMs (3 min) server-side before returning.
    # If the job is not done within 3 min, jobComplete is false and we retry --
    # no sleep needed. BQ errors surface as Workflows exceptions automatically.
    - poll_bq_job:
        steps:
          - check_bq_status:
              call: googleapis.bigquery.v2.jobs.getQueryResults
              args:
                projectId: "agentic-platforms-sandbox"
                jobId: ${bq_job_response.jobReference.jobId}
                location: "australia-southeast1"
                timeoutMs: 180000
              result: bq_job_status
          - evaluate_bq_status:
              switch:
                - condition: ${bq_job_status.jobComplete == true}
                  next: generate_briefs_parallel
                - condition: true
                  next: check_bq_status

    # Step 3: Fan out brief generation. One Cloud Run call per vendor, in parallel.
    # Replace the in: list with a BQ query result once case_brief_inputs table exists.
    - generate_briefs_parallel:
        parallel:
          for:
            value: vendor_id
            in: ["test-vendor-001", "test-vendor-002", "test-vendor-003"]
            steps:
              - call_brief_service:
                  call: http.post
                  args:
                    url: "https://fraud-case-brief-747682583836.australia-southeast1.run.app/generate"
                    auth:
                      type: OIDC
                    headers:
                      Content-Type: "application/json"
                    body:
                      vendor_id: ${vendor_id}
                  result: brief_response

    # Step 4: Return summary
    - return_results:
        return:
          bq_status: ${bq_job_status.jobComplete}
          brief_status: "parallel fan-out complete"