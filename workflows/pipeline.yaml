main:
  steps:
    # Step 1: Run placeholder BQ query (SELECT 1) — confirms SA has BQ job submission rights.
    # Replace with vendor_attributes.sql once SA has dataViewer on source datasets.
    - run_bq_placeholder:
        call: http.post
        args:
          url: "https://bigquery.googleapis.com/bigquery/v2/projects/agentic-platforms-sandbox/jobs"
          auth:
            type: OAuth2
          body:
            jobReference:
              projectId: "agentic-platforms-sandbox"
              location: "australia-southeast1"
            configuration:
              query:
                query: "SELECT 1"
                useLegacySql: false
                location: "australia-southeast1"
        result: bq_job_response

    # Step 2: Wait for BigQuery job to complete
    - wait_for_bq:
        call: http.get
        args:
          url: ${"https://bigquery.googleapis.com/bigquery/v2/projects/agentic-platforms-sandbox/jobs/" + bq_job_response.body.jobReference.jobId + "?location=australia-southeast1"}
          auth:
            type: OAuth2
        result: bq_job_status

    # Step 3: Call Cloud Run brief generation service
    - call_brief_service:
        call: http.post
        args:
          url: "https://fraud-case-brief-747682583836.australia-southeast1.run.app/generate"
          auth:
            type: OIDC
          headers:
            Content-Type: "application/json"
          body:
            vendor_id: "test-vendor-001"
        result: brief_response

    # Step 4: Return results
    - return_results:
        return:
          bq_status: ${bq_job_status.body.status.state}
          brief_status: ${brief_response.body.status}
